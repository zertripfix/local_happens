name: local_happens
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  flutter_bloc: ^9.1.1

  go_router: ^17.1.0

  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  firebase_storage: ^13.1.0
  cloud_firestore: ^6.1.3
  get_it: ^9.2.1
  equatable: ^2.0.8
  google_sign_in: ^7.2.0
  google_maps_flutter: ^2.15.0
  google_maps_flutter_android: ^2.19.3
  google_maps_flutter_ios: ^2.18.0
  google_maps_flutter_platform_interface: ^2.15.0
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  image_picker: ^1.1.1
  cached_network_image: ^3.4.1
  flutter_image_compress: ^2.4.0
  intl: ^0.19.0
  url_launcher: ^6.3.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - lib/assets/icons/admin_icon.svg
    - lib/assets/icons/heart_icon.svg
    - lib/assets/icons/home_icon.svg
    - lib/assets/icons/map_icon.svg
    - lib/assets/icons/profile_icon.svg